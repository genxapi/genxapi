name: Publish Template Kubb

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-template-kubb
  cancel-in-progress: false

jobs:
  release-template-kubb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install

      - name: Test Kubb template
        run: npm run test --workspace "@genxapi/template-kubb"

      - name: Verify Kubb release baseline
        run: node scripts/verify-release-baseline.mjs packages/template-kubb template-kubb-v

      - name: Release Kubb template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release --workspace "@genxapi/template-kubb"
