name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: npm install
      - name: Verify tag matches package versions
        run: node scripts/verify-release-tag.mjs --workspace cli --tag-prefix cli-v
      - name: Build CLI
        run: npm run build --workspace "@genxapi/cli"
      - name: Pack smoke test
        run: npm run pack:cli:smoke
      - name: Publish CLI
        run: npm publish --workspace "@genxapi/cli" --access public --provenance
