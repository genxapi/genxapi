name: Publish CLI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install

      - name: Test CLI
        run: npm run test --workspace "@genxapi/cli"

      - name: CLI pack smoke test
        run: npm run pack:cli:smoke

      - name: Release CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release --workspace "@genxapi/cli"
