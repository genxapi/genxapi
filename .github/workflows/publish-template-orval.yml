name: Publish Template Orval

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-template-orval
  cancel-in-progress: false

jobs:
  release-template-orval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install

      - name: Test Orval template
        run: npm run test --workspace "@genxapi/template-orval"

      - name: Release Orval template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release --workspace "@genxapi/template-orval"
